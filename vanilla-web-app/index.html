<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✦ Iwan's Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Toast container -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <header class="topbar">
    <div class="topbar-left">
      <span class="topbar-title">✦ Dashboard</span>
    </div>
    <div class="topbar-right">
      <!-- Accent colour picker -->
      <span class="color-picker-label">Choose your colour</span>
      <label class="color-picker-wrap" aria-label="Accent colour">
        <input type="color" id="accent-picker" value="#4f6ef7" title="Pick accent colour" />
        <span>🎨</span>
      </label>
      <button id="theme-toggle" type="button" aria-label="Toggle dark mode">🌙</button>
    </div>
  </header>

  <main class="dashboard">

    <!-- Greeting Widget -->
    <section class="widget widget-greeting-card" id="widget-greeting" aria-label="Greeting">
      <div class="greeting-body">
        <p id="greeting-time" aria-live="polite"></p>
        <p id="greeting-date">
        <span id="greeting-date-text"></span><span id="greeting-location-wrap" class="greeting-location-wrap" hidden> <span class="greeting-sep">|</span> <span id="greeting-location-text"></span></span>
      </p>
        <h1 id="greeting-message"></h1>
        <p id="greeting-quote" class="greeting-quote"></p>
      </div>
      <form id="name-form" novalidate>
        <input type="text" id="name-input" placeholder="Your name…" aria-label="Your name" autocomplete="off" maxlength="40" />
        <button type="submit">Save</button>
      </form>
    </section>

    <!-- Focus Timer Widget -->
    <section class="widget" id="widget-timer" aria-label="Focus Timer">
      <h2>Focus Timer</h2>

      <!-- SVG progress ring -->
      <div class="timer-ring-wrap">
        <svg class="timer-ring" viewBox="0 0 120 120" aria-hidden="true">
          <circle class="timer-ring-track" cx="60" cy="60" r="52" />
          <circle class="timer-ring-fill" id="timer-ring-fill" cx="60" cy="60" r="52" />
        </svg>
        <p id="timer-display" aria-live="polite">25:00</p>
      </div>

      <!-- Preset buttons -->
      <div class="timer-presets">
        <button type="button" class="btn-preset active" data-seconds="1500">25 min</button>
        <button type="button" class="btn-preset" data-seconds="300">5 min</button>
        <button type="button" class="btn-preset" data-seconds="900">15 min</button>
      </div>

      <div class="timer-controls">
        <button id="timer-start" type="button">▶ Start</button>
        <button id="timer-stop" type="button">⏸ Stop</button>
        <button id="timer-reset" type="button">↺ Reset</button>
      </div>

      <!-- Progress bar -->
      <div class="timer-bar-wrap" aria-hidden="true">
        <div class="timer-bar" id="timer-bar"></div>
      </div>
    </section>

    <!-- To-Do List Widget -->
    <section class="widget" id="widget-todo" aria-label="To-Do List">
      <div class="widget-header">
        <h2>To-Do List</h2>
        <span id="todo-badge" class="badge" aria-label="Task progress"></span>
      </div>
      <form id="todo-form" novalidate>
        <input
          type="text"
          id="todo-input"
          placeholder="Add a task… (press /)"
          aria-label="New task label"
          autocomplete="off"
        />
        <button type="submit">Add</button>
        <p id="todo-error" class="validation-msg" role="alert" aria-live="assertive"></p>
      </form>
      <ul id="todo-list" aria-label="Task list"></ul>
      <p id="todo-empty" class="empty-state" hidden>No tasks yet — add one above ✨</p>
    </section>

    <!-- Quick Links Widget -->
    <section class="widget" id="widget-links" aria-label="Quick Links">
      <div class="widget-header">
        <h2>Quick Links</h2>
        <span id="links-badge" class="badge" aria-label="Links count"></span>
      </div>
      <form id="links-form" novalidate>
        <input
          type="text"
          id="links-label-input"
          placeholder="Label"
          aria-label="Link label"
          autocomplete="off"
        />
        <input
          type="url"
          id="links-url-input"
          placeholder="https://example.com"
          aria-label="Link URL"
          autocomplete="off"
        />
        <button type="submit">Add</button>
        <p id="links-error" class="validation-msg" role="alert" aria-live="assertive"></p>
      </form>
      <div id="links-panel" aria-label="Saved links"></div>
      <p id="links-empty" class="empty-state" hidden>No links saved yet 🔗</p>
    </section>

  </main>

  <footer class="site-footer">
    Designed by: <span class="site-footer-name">Ade Iwan Setiawan</span>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
